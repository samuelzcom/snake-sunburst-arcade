version: 1
core:
  operations_repo: samuelz-platform
  primary_product_repo: samuelz-web
ownership:
  operations:
    owner: "@samuelzcom"
    scope:
      - ".github/workflows/ci.yml"
      - ".github/dependabot.yml"
      - ".github/ownership.yml"
      - ".github/OWNERSHIP.md"
      - ".github/CODEOWNERS"
      - ".editorconfig"
      - "Makefile"
  product:
    owner: "@samuelzcom"
    scope:
      - "all non-operations areas"
process:
  single_source: "samuelz-platform"
  distribution: "manual baseline rollout from samuelz-platform"
  drift_prevention:
    - "Changes are made in samuelz-platform first."
    - "Sibling repos are updated through intentional rollout work."
    - "Do not let shared baseline files drift silently across sibling repos."
