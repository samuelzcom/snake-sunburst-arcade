name: Sync Repo Operations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Sync operations templates from source
        env:
          SOURCE_REPO: ${{ vars.REPO_OPERATIONS_SOURCE || 'samuelzcom/samuelz-platform' }}
          SOURCE_REF: ${{ vars.REPO_OPERATIONS_REF || 'main' }}
          GH_TOKEN: ${{ secrets.REPO_OPERATIONS_TOKEN }}
          TARGET_BRANCH: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          tmp_dir=$(mktemp -d)
          clone_url="https://github.com/${SOURCE_REPO}.git"

          if [ -n "$GH_TOKEN" ]; then
            clone_url="https://x-access-token:${GH_TOKEN}@github.com/${SOURCE_REPO}.git"
          fi

          git clone --depth 1 --branch "$SOURCE_REF" "$clone_url" "$tmp_dir"

          base_files=(
            "Makefile"
            ".editorconfig"
            ".github/dependabot.yml"
            ".github/ownership.yml"
            ".github/OWNERSHIP.md"
            ".github/CODEOWNERS"
          )

          workflow_files=(
            ".github/workflows/ci.yml"
            ".github/workflows/repo-operations-action-failure-issue.yml"
            ".github/workflows/repo-operations-direct-push-guard.yml"
            ".github/workflows/repo-operations-merge-policy.yml"
            ".github/workflows/repo-operations-sync.yml"
          )

          files=("${base_files[@]}")
          if [ -n "$GH_TOKEN" ]; then
            files+=("${workflow_files[@]}")
          else
            echo "REPO_OPERATIONS_TOKEN is not configured; skipping workflow file synchronization."
          fi

          for file in "${files[@]}"; do
            if [ -f "$tmp_dir/$file" ]; then
              mkdir -p "$(dirname "$file")"
              cp "$tmp_dir/$file" "$file"
            fi
          done

          if git diff --quiet -- "${files[@]}"; then
            echo "No operations changes to apply."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- "${files[@]}"
          git commit -m "chore(operations): sync repo operation templates [skip ci]"

          push_token="${GH_TOKEN:-${{ secrets.GITHUB_TOKEN }}}"
          git push "https://x-access-token:${push_token}@github.com/${{ github.repository }}.git" "HEAD:$TARGET_BRANCH"
