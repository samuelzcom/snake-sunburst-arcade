name: Open Issue on Failed Workflow

on:
  workflow_run:
    types:
      - completed

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  create-issue:
    if: |
      github.event.workflow_run.name != 'Open Issue on Failed Workflow'
      && github.event.workflow_run.conclusion != 'success'
      && github.event.workflow_run.conclusion != 'skipped'
      && github.event.workflow_run.conclusion != 'neutral'
    runs-on: ubuntu-latest
    steps:
      - name: Open tracking issue for failed action
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const runTitle = `Workflow "${run.name}" failed (${run.conclusion})`;
            const issueTitle = `${runTitle} [Run #${run.run_number}]`;
            const { owner, repo } = context.repo;

            const existingIssue = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            if (existingIssue.some((issue) => issue.title === issueTitle)) {
              core.info(`Open issue already exists for run ${run.id}`);
              return;
            }

            const body = [
              "## Workflow Failure",
              "",
              `- Workflow: **${run.name}**`,
              `- Conclusion: **${run.conclusion}**`,
              `- Trigger: \`${run.event}\``,
              `- Branch: \`${run.head_branch}\``,
              `- Commit: \`${run.head_sha}\``,
              `- Triggered by: @${run.actor.login}`,
              `- Run: [${run.html_url}](${run.html_url})`,
              "",
              "### Required action",
              "1. Open the failed workflow run and inspect the failing step logs.",
              "2. Fix the root cause in code, config, or secrets.",
              "3. Re-run the workflow and verify all checks are green.",
              "4. Close this issue only after a successful re-run.",
              "",
              "Note: This issue is created automatically for each failed workflow run.",
            ].join("\\n");

            await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body,
            });
